<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Gallery - Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- Thanh điều hướng -->
    <nav class="navbar">
        <a href="/" class="logo">☁️ Cloud<span>Gallery</span></a>
        <div class="nav-links" id="nav-links">
            <a href="/gallery.html">Gallery</a>
            <a href="/login.html">Đăng nhập</a>
            <a href="/register.html">Đăng ký</a>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>📋 Dashboard</h1>
            <p>Quản lý ảnh của bạn</p>
        </div>

        <!-- Thông báo -->
        <div class="alert alert-error" id="alert-error"></div>
        <div class="alert alert-success" id="alert-success"></div>

        <!-- Form Upload ảnh -->
        <div class="upload-section">
            <h2>📤 Upload ảnh mới</h2>
            <form id="upload-form" onsubmit="handleUpload(event)" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="title">Tiêu đề ảnh</label>
                    <input type="text" id="title" name="title" placeholder="Nhập tiêu đề cho ảnh" required>
                </div>

                <div class="form-group">
                    <label for="description">Mô tả (tùy chọn)</label>
                    <textarea id="description" name="description" placeholder="Mô tả ngắn về ảnh..."></textarea>
                </div>

                <div class="form-group">
                    <label for="image-file">Chọn ảnh</label>
                    <div class="file-input-wrapper">
                        <input type="file" id="image-file" name="image" 
                               accept="image/jpeg,image/png,image/gif,image/webp" required>
                    </div>
                    <small style="color: #999;">Chấp nhận: JPG, PNG, GIF, WebP. Tối đa 5MB.</small>
                </div>

                <button type="submit" class="btn btn-upload">📤 Upload ảnh</button>
            </form>
        </div>

        <!-- Danh sách ảnh của user -->
        <div class="page-header" style="margin-top: 20px;">
            <h2>🖼️ Ảnh của bạn</h2>
        </div>

        <div class="gallery-grid" id="my-images-grid">
            <div class="loading">Đang tải ảnh của bạn...</div>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
