<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Gallery - Đăng nhập</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- Thanh điều hướng -->
    <nav class="navbar">
        <a href="/" class="logo">☁️ Cloud<span>Gallery</span></a>
        <div class="nav-links" id="nav-links">
            <a href="/gallery.html">Gallery</a>
            <a href="/login.html">Đăng nhập</a>
            <a href="/register.html">Đăng ký</a>
        </div>
    </nav>

    <!-- Form đăng nhập -->
    <div class="auth-container">
        <form class="auth-form" onsubmit="handleLogin(event)">
            <h2>Đăng nhập</h2>

            <!-- Thông báo lỗi/thành công -->
            <div class="alert alert-error" id="alert-error"></div>
            <div class="alert alert-success" id="alert-success"></div>

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Nhập username" required>
            </div>

            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" placeholder="Nhập mật khẩu" required>
            </div>

            <button type="submit" class="btn btn-primary">Đăng nhập</button>

            <div class="auth-link">
                Chưa có tài khoản? <a href="/register.html">Đăng ký ngay</a>
            </div>
        </form>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
